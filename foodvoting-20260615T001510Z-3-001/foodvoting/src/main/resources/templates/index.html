<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Voting App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff7ed;
            color: #222;
        }

        .container {
            width: min(1100px, 92%);
            margin: 0 auto;
            padding: 30px 0;
        }

        .hero {
            text-align: center;
            background: white;
            border-radius: 24px;
            padding: 35px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 36px;
        }

        .winner-card {
            background: linear-gradient(135deg, #fff3c4, #ffffff);
            border: 2px solid #f5c542;
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .winner-card h2 {
            margin-top: 0;
            color: #b7791f;
        }

        .winner-food-name {
            font-size: 28px;
            font-weight: bold;
            margin: 8px 0;
        }

        .winner-image {
            width: 180px;
            height: 140px;
            object-fit: cover;
            border-radius: 18px;
            margin-top: 12px;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.07);
        }

        form.add-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="file"] {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            flex: 1;
            min-width: 220px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            background: #ff7a1a;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .food-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .food-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.07);
        }

        .food-card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 16px;
            background: #f2f2f2;
        }

        .food-card h3 {
            margin-bottom: 6px;
        }

        .vote-count {
            font-size: 18px;
            font-weight: bold;
            color: #ff7a1a;
        }

        .empty-message {
            text-align: center;
            background: white;
            padding: 24px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🍔 Food Voting App 🥗</h1>
        <p>Upload food photos and vote for your favorite food.</p>
    </div>

    <div class="winner-card" th:if="${winnerFood != null}">
        <h2>🏆 Winner Food</h2>
        <div class="winner-food-name" th:text="${winnerFood.name}">Food Name</div>
        <p>
            Total Votes:
            <span class="vote-count" th:text="${winnerFood.voteCount}">0</span>
        </p>
        <img class="winner-image"
             th:if="${winnerFood.imageName != null}"
             th:src="@{'/uploads/' + ${winnerFood.imageName}}"
             alt="Winner food image">
    </div>

    <div class="winner-card" th:if="${winnerFood == null}">
        <h2>🏆 Winner Food</h2>
        <p>No food added yet. Add food first to see the winner.</p>
    </div>

    <div class="form-card">
        <h2>Add New Food</h2>
        <form class="add-form" action="/food/add" method="post" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Enter food name..." required>
            <input type="file" name="image" accept="image/*">
            <button type="submit">Add Food</button>
        </form>
    </div>

    <h2>Food List</h2>
    <div class="food-list" th:if="${foods != null and !foods.isEmpty()}">
        <div class="food-card" th:each="food : ${foods}">
            <img th:if="${food.imageName != null}"
                 th:src="@{'/uploads/' + ${food.imageName}}"
                 alt="Food image">

            <h3 th:text="${food.name}">Food Name</h3>
            <p>
                Votes:
                <span class="vote-count" th:text="${food.voteCount}">0</span>
            </p>

            <form action="/food/vote" method="post">
                <input type="hidden" name="id" th:value="${food.id}">
                <button type="submit">Vote 👍</button>
            </form>
        </div>
    </div>

    <div class="empty-message" th:if="${foods == null or foods.isEmpty()}">
        <p>No food available yet.</p>
    </div>
</div>
</body>
</html>
